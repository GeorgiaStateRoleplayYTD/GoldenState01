<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State Roleplay - v2.0.1 Feature Event</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body {
        background: url('https://rare-gallery.com/mocahbig/459795-Gilles-Ketting-night-dark-house-building-spooky.jpg') center/cover no-repeat fixed;
        overflow-x: hidden;
        color: #ddd;
        font-family: system-ui, -apple-system, sans-serif;
    }
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: linear-gradient(rgba(15, 0, 0, 0.75), rgba(8, 0, 0, 0.9));
        z-index: -10;
    }

    /* Enhanced Blood Neon */
    .neon-red {
        color: #ff1e4a;
        text-shadow: 0 0 15px #ff1e4a,
                     0 0 35px #b71c1c,
                     0 0 60px #7f0000;
    }

    /* Fog & Atmosphere */
    .fog {
        position: fixed;
        inset: 0;
        background: url('https://i.imgur.com/oZhKQoT.png');
        background-size: cover;
        opacity: 0.35;
        z-index: -6;
        pointer-events: none;
        animation: fogMove 70s linear infinite;
        mix-blend-mode: multiply;
        filter: hue-rotate(350deg) saturate(2.8) brightness(0.85);
    }
    @keyframes fogMove {
        0% { transform: translateX(0) scale(1.05); }
        50% { transform: translateX(-100px) scale(1.15); }
        100% { transform: translateX(0) scale(1.05); }
    }

    .rain {
        position: fixed;
        inset: 0;
        background: linear-gradient(transparent 0%, rgba(255, 50, 50, 0.18) 50%, transparent 100%);
        background-size: 2.5px 160px;
        animation: rainMove 0.4s linear infinite;
        z-index: -5;
        pointer-events: none;
        opacity: 0.5;
    }
    @keyframes rainMove {
        from { background-position: 0 0; }
        to { background-position: 0 160px; }
    }

    /* Floating Blood Orbs */
    .blob {
        position: fixed;
        width: 320px;
        height: 320px;
        background: radial-gradient(circle, rgba(220, 20, 60, 0.55), transparent 65%);
        filter: blur(65px);
        border-radius: 50%;
        z-index: -4;
        animation: floatBlob 28s infinite ease-in-out;
    }
    @keyframes floatBlob {
        0%   { transform: translate(0, 0); opacity: 0.25; }
        50%  { transform: translate(120px, -140px); opacity: 0.45; }
        100% { transform: translate(-90px, 110px); opacity: 0.25; }
    }

    /* Cards */
    .event-card {
        background: rgba(20, 0, 0, 0.75);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 30, 60, 0.3);
        transition: all 0.4s ease;
    }
    .event-card:hover {
        transform: translateY(-8px);
        border-color: #ff1e4a;
        box-shadow: 0 0 40px rgba(255, 30, 60, 0.4);
    }
</style>
</head>
<body class="min-h-screen">

<!-- EFFECTS -->
<div class="fog"></div>
<div class="rain"></div>

<!-- BLOBS -->
<div class="blob" style="top:10%; left:5%;"></div>
<div class="blob" style="top:50%; left:70%; animation-delay: -10s;"></div>
<div class="blob" style="top:25%; left:75%; animation-delay: -18s;"></div>
<div class="blob" style="top:65%; left:12%; animation-delay: -7s;"></div>

<!-- MUSIC -->
<audio id="bg-music" loop></audio>

<div id="music-control" class="fixed bottom-6 right-6 z-50 bg-black/80 border border-red-700 rounded-full px-5 py-3 flex items-center gap-3 text-sm backdrop-blur-md">
    <button onclick="toggleMusic()" class="flex items-center gap-2 text-[#ff1e4a] hover:text-white transition">
        <span id="music-icon">♪</span>
        <span id="music-text">Play Horror Ambient</span>
    </button>
</div>

<!-- LOADING -->
<div id="loading-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">
    <h1 class="text-6xl neon-red font-black tracking-[4px] mb-3">GOLDEN STATE</h1>
    <p class="text-red-500 text-2xl mb-10 tracking-widest">ROLEPLAY • v2.0.1 FEATURE EVENT</p>
    
    <div class="w-[420px] h-1.5 bg-zinc-900 rounded-full overflow-hidden mb-4 border border-red-900">
        <div id="progress" class="h-full bg-gradient-to-r from-red-600 to-red-400 w-0 transition-all"></div>
    </div>
    <p class="text-red-400 text-sm tracking-widest">ENTERING THE NIGHTMARE...</p>
</div>

<!-- MAIN -->
<div id="main-content" class="hidden text-center py-16 px-6">
    <h1 class="text-7xl neon-red font-black tracking-widest mb-2">LIVE EVENTS</h1>
    <div class="text-red-400 font-mono text-lg mb-12" id="current-time">Loading time...</div>

    <div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto">
        <!-- Standalone -->
        <div class="event-card p-10 rounded-3xl">
            <h2 class="text-3xl font-bold mb-4 text-red-300">Standalone</h2>
            <div id="standalone-timer" class="text-4xl neon-red font-mono mb-8">00D 00H 00M 00S</div>
            <button id="standalone-btn" disabled 
                    class="w-full py-5 rounded-2xl font-bold text-lg border-2 border-red-900 hover:border-red-500 transition-all">
                EVENT LOCKED
            </button>
        </div>

        <!-- QBcore -->
        <div class="event-card p-10 rounded-3xl">
            <h2 class="text-3xl font-bold mb-4 text-red-300">QBcore</h2>
            <div id="qbcore-timer" class="text-4xl neon-red font-mono mb-8">00D 00H 00M 00S</div>
            <button id="qbcore-btn" disabled 
                    class="w-full py-5 rounded-2xl font-bold text-lg border-2 border-red-900 hover:border-red-500 transition-all">
                EVENT LOCKED
            </button>
        </div>
    </div>

    <div class="mt-16 text-red-400/70 max-w-xl mx-auto text-sm leading-relaxed">
        You guys are very welcome to stream and help the community out promoting it ❤️
    </div>
</div>

<script>
// Live Clock
function updateDateTime() {
    const el = document.getElementById("current-time");
    el.textContent = new Date().toLocaleString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
    });
}
setInterval(updateDateTime, 1000);
updateDateTime();

// Loading
window.onload = () => {
    let p = 0;
    const bar = document.getElementById("progress");
    const interval = setInterval(() => {
        p += 2;
        bar.style.width = p + "%";
        if(p >= 100){
            clearInterval(interval);
            document.getElementById("loading-screen").style.display = "none";
            document.getElementById("main-content").classList.remove("hidden");
        }
    }, 45);
};

// Music (YouTube link won't work directly - replace with real MP3 when possible)
const audio = document.getElementById("bg-music");
let isPlaying = false;

function toggleMusic() {
    if (!audio.src || audio.src === window.location.href) {
        alert("Please host the music file and update the <source> in the code.");
        return;
    }
    if (isPlaying) {
        audio.pause();
        document.getElementById("music-text").textContent = "Paused";
    } else {
        audio.play();
        document.getElementById("music-text").textContent = "Playing Horror Ambient";
    }
    isPlaying = !isPlaying;
}

// Countdowns
function startCountdown(timerId, btnId, targetTime, link) {
    const timerEl = document.getElementById(timerId);
    const btn = document.getElementById(btnId);

    const update = () => {
        const diff = targetTime - Date.now();
        if (diff <= 0) {
            timerEl.innerHTML = "🚨 EVENT IS LIVE 🚨";
            btn.disabled = false;
            btn.className = "w-full py-5 rounded-2xl font-bold text-lg bg-red-600 hover:bg-red-500 text-black transition-all";
            btn.innerHTML = "CONNECT NOW";
            btn.onclick = () => window.location.href = link;
            return;
        }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff / 3600000) % 24);
        const m = Math.floor((diff / 60000) % 60);
        const s = Math.floor((diff / 1000) % 60);
        timerEl.innerHTML = `${d}D ${h}H ${m}M ${s}S`;
    };
    update();
    setInterval(update, 1000);
}

// Event Times
startCountdown("standalone-timer", "standalone-btn", new Date("2026-05-08T16:45:00-06:00").getTime(), "fivem://connect/STANDALONE_IP");
startCountdown("qbcore-timer", "qbcore-btn", new Date("2026-05-09T16:45:00-06:00").getTime(), "fivem://connect/QBCORE_IP");
</script>
</body>
</html>
