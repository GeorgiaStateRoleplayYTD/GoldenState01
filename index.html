<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State Roleplay - v2.0.1</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: url('https://i.imgur.com/JHY3Pri.png') center/cover no-repeat fixed;
    overflow-x: hidden;
}

/* DARK OVERLAY */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: -10;
}

/* NEON TEXT */
.neon-green {
    color: #a3e635;
    text-shadow: 0 0 20px #a3e635;
}

/* =========================
   🌫 FOG (FIXED + STABLE)
========================= */
.fog {
    position: fixed;
    inset: 0;
    background: url('https://i.imgur.com/oZhKQoT.png');
    background-size: cover;
    opacity: 0.18;
    z-index: -6;
    pointer-events: none;
    animation: fogMove 60s linear infinite;
    mix-blend-mode: screen;
}

@keyframes fogMove {
    0% { transform: translateX(0px) scale(1.1); }
    50% { transform: translateX(-80px) scale(1.2); }
    100% { transform: translateX(0px) scale(1.1); }
}

/* =========================
   🌧 CSS RAIN (NO IMAGES = NO ERRORS)
========================= */
.rain {
    position: fixed;
    inset: 0;
    background-image: linear-gradient(
        transparent 0%,
        rgba(255,255,255,0.05) 50%,
        transparent 100%
    );
    background-size: 2px 120px;
    animation: rainMove 0.45s linear infinite;
    z-index: -5;
    pointer-events: none;
    opacity: 0.25;
}

@keyframes rainMove {
    from { background-position: 0 0; }
    to { background-position: 0 120px; }
}

/* =========================
   📡 RADAR
========================= */
.radar {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: conic-gradient(rgba(163,230,53,0.2), transparent 60%);
    animation: radarSpin 6s linear infinite;
    z-index: -6;
    pointer-events: none;
}

@keyframes radarSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* =========================
   🟢 FLOATING BLOBS
========================= */
.blob {
    position: fixed;
    width: 240px;
    height: 240px;
    background: radial-gradient(circle, rgba(163,230,53,0.6), transparent 70%);
    filter: blur(45px);
    border-radius: 50%;
    z-index: -4;
    animation: floatBlob 18s infinite ease-in-out;
}

@keyframes floatBlob {
    0% { transform: translate(0,0); opacity:0.2; }
    50% { transform: translate(80px,-100px); opacity:0.5; }
    100% { transform: translate(-60px,70px); opacity:0.2; }
}

/* =========================
   ⚡ LIGHTNING
========================= */
#lightning {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    z-index: 20;
    pointer-events: none;
}

/* =========================
   LOADING BAR
========================= */
#progress {
    transition: width 0.2s ease;
}
</style>
</head>

<body class="text-white min-h-screen">

<!-- EFFECTS -->
<div class="fog"></div>
<div class="rain"></div>
<div class="radar"></div>
<div id="lightning"></div>

<!-- BLOBS -->
<div class="blob" style="top:10%; left:15%;"></div>
<div class="blob" style="top:60%; left:70%;"></div>
<div class="blob" style="top:30%; left:80%;"></div>
<div class="blob" style="top:75%; left:20%;"></div>

<!-- LOADING SCREEN -->
<div id="loading-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">

    <h1 class="text-5xl neon-green font-black mb-4">GOLDEN STATE ROLEPLAY</h1>
    <p class="text-[#a3e635] mb-8">v2.0.1 SYSTEM BOOT</p>

    <div class="w-96 h-2 bg-zinc-800 rounded-full overflow-hidden">
        <div id="progress" class="h-full bg-[#a3e635] w-0"></div>
    </div>

    <p class="text-gray-400 mt-4 text-sm">INITIALIZING ENVIRONMENT...</p>
</div>

<!-- MAIN -->
<div id="main-content" class="hidden text-center py-20">

<h1 class="text-6xl neon-green font-black">LIVE EVENTS</h1>

<div class="grid md:grid-cols-2 gap-10 max-w-6xl mx-auto mt-16">

<!-- Standalone -->
<div class="bg-zinc-900 p-8 rounded-3xl">
    <h2 class="text-2xl font-bold mb-3">Standalone</h2>
    <div id="standalone-timer" class="text-3xl neon-green mb-6">Loading...</div>

    <button id="standalone-btn"
        disabled
        class="w-full bg-gray-600 py-4 rounded-xl font-bold opacity-50">
        EVENT LOCKED
    </button>
</div>

<!-- QBcore -->
<div class="bg-zinc-900 p-8 rounded-3xl">
    <h2 class="text-2xl font-bold mb-3">QBcore</h2>
    <div id="qbcore-timer" class="text-3xl neon-green mb-6">Loading...</div>

    <button id="qbcore-btn"
        disabled
        class="w-full bg-gray-600 py-4 rounded-xl font-bold opacity-50">
        EVENT LOCKED
    </button>
</div>

</div>
</div>

<script>

/* LOADING BAR */
window.onload = () => {
    let p = 0;
    const bar = document.getElementById("progress");

    const load = setInterval(() => {
        p++;
        bar.style.width = p + "%";

        if(p >= 100){
            clearInterval(load);
            document.getElementById("loading-screen").style.display = "none";
            document.getElementById("main-content").classList.remove("hidden");

            lightningLoop();
        }
    }, 60);
};

/* LIGHTNING */
function lightningLoop(){
    const flash = document.getElementById("lightning");

    setInterval(() => {
        if(Math.random() < 0.2){
            flash.style.opacity = 0.6;
            setTimeout(() => flash.style.opacity = 0, 120);
        }
    }, 1800);
}

/* COUNTDOWN SYSTEM */
function startCountdown(timerId, btnId, target, link){
    const timer = document.getElementById(timerId);
    const btn = document.getElementById(btnId);

    function update(){
        const diff = target - Date.now();

        if(diff <= 0){
            timer.innerHTML = "🚨 EVENT LIVE 🚨";

            btn.disabled = false;
            btn.className = "w-full bg-[#a3e635] py-4 rounded-xl font-bold";
            btn.innerHTML = "CONNECT NOW";

            btn.onclick = () => {
                window.location.href = link;
            };

            return;
        }

        const d = Math.floor(diff/86400000);
        const h = Math.floor(diff/3600000%24);
        const m = Math.floor(diff/60000%60);
        const s = Math.floor(diff/1000%60);

        timer.innerHTML = `${d}D ${h}H ${m}M ${s}S`;
    }

    update();
    setInterval(update, 1000);
}

/* EVENTS */
startCountdown(
    "standalone-timer",
    "standalone-btn",
    new Date("2026-05-08T16:45:00-06:00").getTime(),
    "fivem://connect/STANDALONE_IP"
);

startCountdown(
    "qbcore-timer",
    "qbcore-btn",
    new Date("2026-05-09T16:45:00-06:00").getTime(),
    "fivem://connect/QBCORE_IP"
);

</script>

</body>
</html>
