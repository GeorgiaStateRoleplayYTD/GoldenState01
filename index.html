<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State Roleplay - v2.0.1</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body {
    background: url('https://i.imgur.com/JHY3Pri.png') center/cover no-repeat fixed;
    overflow-x: hidden;
}

/* DARK OVERLAY */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: -3;
}

/* NEON TEXT */
.neon-green {
    color: #a3e635;
    text-shadow: 0 0 20px #a3e635;
}

/* CRT EFFECT */
.crt::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        transparent 0px,
        transparent 2px,
        rgba(163,230,53,0.08) 2px,
        rgba(163,230,53,0.08) 4px
    );
    pointer-events: none;
}

/* =========================
   🟢 FLOATING BLOBS
========================= */
.blob {
    position: fixed;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(163,230,53,0.6), transparent 70%);
    filter: blur(45px);
    border-radius: 50%;
    z-index: -2;
    animation: floatBlob 18s infinite ease-in-out;
    pointer-events: none;
}

@keyframes floatBlob {
    0%   { transform: translate(0,0) scale(1); opacity:0.25; }
    50%  { transform: translate(80px,-100px) scale(1.2); opacity:0.45; }
    100% { transform: translate(-60px,70px) scale(1); opacity:0.25; }
}

/* =========================
   ⚡ LIGHTNING FLASH
========================= */
#lightning {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    z-index: 5;
    pointer-events: none;
}

/* =========================
   🌧 RAIN EFFECT
========================= */
.rain {
    position: fixed;
    inset: 0;
    background: url('https://i.imgur.com/7QF3y7X.png');
    opacity: 0.15;
    animation: rainMove 0.4s linear infinite;
    z-index: -1;
    pointer-events: none;
}

@keyframes rainMove {
    from { background-position: 0 0; }
    to { background-position: 0 100px; }
}

/* =========================
   📡 RADAR SWEEP
========================= */
.radar {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: conic-gradient(
        rgba(163,230,53,0.2),
        transparent 60%
    );
    animation: radarSpin 6s linear infinite;
    z-index: -2;
    pointer-events: none;
    filter: blur(2px);
}

@keyframes radarSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
}

/* =========================
   🔴 RED ALERT MODE
========================= */
.red-alert body,
.red-alert {
    background-color: rgba(255,0,0,0.1);
}
</style>
</head>

<body class="text-white min-h-screen">

<!-- EFFECTS -->
<div class="rain"></div>
<div class="radar"></div>
<div id="lightning"></div>

<!-- BLOBS -->
<div class="blob" style="top:10%; left:15%; animation-duration:14s;"></div>
<div class="blob" style="top:60%; left:70%; animation-duration:18s;"></div>
<div class="blob" style="top:30%; left:80%; animation-duration:22s;"></div>
<div class="blob" style="top:75%; left:20%; animation-duration:16s;"></div>

<!-- SOUND TOGGLE -->
<button onclick="toggleSound()"
class="fixed bottom-6 right-6 bg-[#a3e635] text-black px-4 py-3 rounded-full font-bold z-50">
🔊 SOUND
</button>

<audio id="ambient" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b7c3c0d5f.mp3">
</audio>

<!-- LOADING -->
<div id="loading-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">
    <h1 class="text-5xl neon-green font-black">GOLDEN STATE ROLEPLAY</h1>
    <p class="text-[#a3e635] mt-2">v2.0.1</p>
</div>

<div id="main-content" class="hidden">

<!-- HERO -->
<section class="py-24 text-center">
    <h1 class="text-6xl neon-green font-black">GOLDEN STATE ROLEPLAY</h1>
</section>

<!-- EVENTS -->
<section class="max-w-6xl mx-auto px-6 py-20">

<h2 class="text-4xl text-center neon-green mb-10">LIVE EVENTS</h2>

<div class="grid md:grid-cols-2 gap-10">

<!-- Standalone -->
<div class="bg-zinc-900 p-8 rounded-3xl crt relative">
    <h3 class="text-2xl font-bold mb-3">Standalone</h3>

    <div id="standalone-timer" class="text-3xl neon-green mb-6">Loading...</div>

    <button id="standalone-btn"
    class="w-full bg-gray-600 py-4 rounded-xl font-bold opacity-50 cursor-not-allowed"
    disabled>
    EVENT LOCKED
    </button>
</div>

<!-- QBcore -->
<div class="bg-zinc-900 p-8 rounded-3xl crt relative">
    <h3 class="text-2xl font-bold mb-3">QBcore</h3>

    <div id="qbcore-timer" class="text-3xl neon-green mb-6">Loading...</div>

    <button id="qbcore-btn"
    class="w-full bg-gray-600 py-4 rounded-xl font-bold opacity-50 cursor-not-allowed"
    disabled>
    EVENT LOCKED
    </button>
</div>

</div>
</section>

</div>

<script>

/* =========================
   LOADING
========================= */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loading-screen").style.display = "none";
        document.getElementById("main-content").classList.remove("hidden");

        lightningLoop();
    }, 3000);
};

/* =========================
   SOUND
========================= */
function toggleSound(){
    const audio = document.getElementById("ambient");
    if(audio.paused){
        audio.play();
    } else {
        audio.pause();
    }
}

/* =========================
   LIGHTNING
========================= */
function lightningLoop(){
    const flash = document.getElementById("lightning");

    setInterval(() => {
        if(Math.random() < 0.15){
            flash.style.opacity = 0.6;

            setTimeout(() => {
                flash.style.opacity = 0;
            }, 120);
        }
    }, 2000);
}

/* =========================
   COUNTDOWN SYSTEM
========================= */
function startCountdown(timerId, btnId, target, link){
    const timer = document.getElementById(timerId);
    const btn = document.getElementById(btnId);

    function update(){
        const now = Date.now();
        const diff = target - now;

        if(diff <= 0){
            timer.innerHTML = "🚨 EVENT LIVE 🚨";

            btn.disabled = false;
            btn.className = "w-full bg-[#a3e635] py-4 rounded-xl font-bold";

            btn.innerHTML = "CONNECT NOW";

            btn.onclick = () => {
                document.body.classList.add("red-alert");
                window.location.href = link;
            };

            return;
        }

        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000 % 24);
        const m = Math.floor(diff / 60000 % 60);
        const s = Math.floor(diff / 1000 % 60);

        timer.innerHTML = `${d}D ${h}H ${m}M ${s}S`;
    }

    update();
    setInterval(update, 1000);
}

/* =========================
   EVENTS
========================= */
startCountdown(
    "standalone-timer",
    "standalone-btn",
    new Date("2026-05-08T16:45:00-06:00").getTime(),
    "fivem://connect/STANDALONE_IP"
);

startCountdown(
    "qbcore-timer",
    "qbcore-btn",
    new Date("2026-05-09T16:45:00-06:00").getTime(),
    "fivem://connect/QBCORE_IP"
);

</script>

</body>
</html>
