<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State Roleplay - v2.0.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    background: url('https://i.imgur.com/JHY3Pri.png') center/cover no-repeat fixed;
    overflow-x: hidden;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: -10;
}
.neon-green {
    color: #a3e635;
    text-shadow: 0 0 20px #a3e635;
}

/* Effects */
.fog, .rain, .radar, .blob { /* ... keep your existing styles ... */ }

#lightning {
    position: fixed;
    inset: 0;
    background: rgba(240, 248, 255, 0.85);
    opacity: 0;
    z-index: 20;
    pointer-events: none;
    mix-blend-mode: screen;
    transition: opacity 60ms ease-out;
}

/* Music Button */
#music-control {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 50;
    background: rgba(0,0,0,0.7);
    padding: 10px 16px;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(8px);
}
</style>
</head>
<body class="text-white min-h-screen">

<!-- EFFECTS -->
<div class="fog"></div>
<div class="rain"></div>
<div class="radar"></div>
<div id="lightning"></div>

<!-- BLOBS -->
<div class="blob" style="top:10%; left:15%;"></div>
<div class="blob" style="top:60%; left:70%;"></div>
<div class="blob" style="top:30%; left:80%;"></div>
<div class="blob" style="top:75%; left:20%;"></div>

<!-- BACKGROUND MUSIC -->
<audio id="bg-music" loop>
    <source src="https://www.youtube.com/watch?v=Yhu7sck0gAA" type="audio/mp3">
</audio>

<!-- MUSIC CONTROL -->
<div id="music-control" class="text-sm">
    <button onclick="toggleMusic()" class="flex items-center gap-2 text-[#a3e635]">
        <span id="music-icon">♪</span>
        <span id="music-text">Play Ambient Music</span>
    </button>
</div>

<!-- LOADING SCREEN + MAIN CONTENT (same as before) -->
<div id="loading-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">
    <h1 class="text-5xl neon-green font-black mb-4">GOLDEN STATE ROLEPLAY</h1>
    <p class="text-[#a3e635] mb-8">v2.0.1 SYSTEM BOOT</p>
    <div class="w-96 h-2 bg-zinc-800 rounded-full overflow-hidden">
        <div id="progress" class="h-full bg-[#a3e635] w-0"></div>
    </div>
    <p class="text-gray-400 mt-4 text-sm">INITIALIZING ENVIRONMENT...</p>
</div>

<div id="main-content" class="hidden text-center py-20">
    <h1 class="text-6xl neon-green font-black">LIVE EVENTS</h1>
    <div class="grid md:grid-cols-2 gap-10 max-w-6xl mx-auto mt-16">
        <div class="bg-zinc-900 p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-3">Standalone</h2>
            <div id="standalone-timer" class="text-3xl neon-green mb-6">Loading...</div>
            <button id="standalone-btn" disabled class="w-full bg-gray-600 py-4 rounded-xl font-bold opacity-50">EVENT LOCKED</button>
        </div>
        <div class="bg-zinc-900 p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-3">QBcore</h2>
            <div id="qbcore-timer" class="text-3xl neon-green mb-6">Loading...</div>
            <button id="qbcore-btn" disabled class="w-full bg-gray-600 py-4 rounded-xl font-bold opacity-50">EVENT LOCKED</button>
        </div>
    </div>
</div>

<script>
// LOADING
window.onload = () => {
    let p = 0;
    const bar = document.getElementById("progress");
    const load = setInterval(() => {
        p++;
        bar.style.width = p + "%";
        if(p >= 100){
            clearInterval(load);
            document.getElementById("loading-screen").style.display = "none";
            document.getElementById("main-content").classList.remove("hidden");
            lightningLoop();
            // Auto play music after load
            setTimeout(() => {
                document.getElementById("bg-music").play().catch(()=>{});
            }, 800);
        }
    }, 60);
};

// SUBTLE LIGHTNING (barely noticeable now)
function lightningLoop(){
    const flash = document.getElementById("lightning");
    
    setInterval(() => {
        if (Math.random() < 0.07) {           // Very rare now
            const duration = Math.random() * 90 + 50;
            
            flash.style.opacity = Math.random() * 0.45 + 0.25;
            
            setTimeout(() => { flash.style.opacity = 0; }, duration);
        }
    }, 1800);
}

// MUSIC CONTROL
let isPlaying = true;
const audio = document.getElementById("bg-music");

function toggleMusic() {
    if (isPlaying) {
        audio.pause();
        document.getElementById("music-text").textContent = "Paused";
        document.getElementById("music-icon").textContent = "♫";
    } else {
        audio.play();
        document.getElementById("music-text").textContent = "Playing Ambient";
        document.getElementById("music-icon").textContent = "♪";
    }
    isPlaying = !isPlaying;
}

// COUNTDOWN (unchanged)
function startCountdown(timerId, btnId, target, link){
    const timer = document.getElementById(timerId);
    const btn = document.getElementById(btnId);
    
    function update(){
        const diff = target - Date.now();
        if(diff <= 0){
            timer.innerHTML = "🚨 EVENT LIVE 🚨";
            btn.disabled = false;
            btn.className = "w-full bg-[#a3e635] text-black py-4 rounded-xl font-bold";
            btn.innerHTML = "CONNECT NOW";
            btn.onclick = () => window.location.href = link;
            return;
        }
        const d = Math.floor(diff/86400000);
        const h = Math.floor((diff/3600000)%24);
        const m = Math.floor((diff/60000)%60);
        const s = Math.floor((diff/1000)%60);
        timer.innerHTML = `${d}D ${h}H ${m}M ${s}S`;
    }
    update();
    setInterval(update, 1000);
}

startCountdown("standalone-timer", "standalone-btn", new Date("2026-05-08T16:45:00-06:00").getTime(), "fivem://connect/STANDALONE_IP");
startCountdown("qbcore-timer", "qbcore-btn", new Date("2026-05-09T16:45:00-06:00").getTime(), "fivem://connect/QBCORE_IP");
</script>
</body>
</html>
