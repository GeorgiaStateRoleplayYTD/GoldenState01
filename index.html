<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State Roleplay - v2.0.1 Feature Event</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    background: url('https://rare-gallery.com/mocahbig/459795-Gilles-Ketting-night-dark-house-building-spooky.jpg') center/cover no-repeat fixed;
    overflow-x: hidden;
    color: #ddd;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(15, 0, 0, 0.85); /* Strong dark blood/red overlay for scary mood */
    z-index: -10;
}

/* BLOOD NEON */
.neon-red {
    color: #ff1744;
    text-shadow: 0 0 20px #ff1744,
                 0 0 40px #b71c1c;
}

/* Effects */
.fog {
    position: fixed;
    inset: 0;
    background: url('https://i.imgur.com/oZhKQoT.png');
    background-size: cover;
    opacity: 0.32;
    z-index: -6;
    pointer-events: none;
    animation: fogMove 60s linear infinite;
    mix-blend-mode: multiply;
    filter: hue-rotate(340deg) saturate(2.5);
}
@keyframes fogMove {
    0% { transform: translateX(0px) scale(1.1); }
    50% { transform: translateX(-80px) scale(1.2); }
    100% { transform: translateX(0px) scale(1.1); }
}

.rain {
    position: fixed;
    inset: 0;
    background-image: linear-gradient(
        transparent 0%,
        rgba(255, 40, 40, 0.20) 50%,
        transparent 100%
    );
    background-size: 2px 140px;
    animation: rainMove 0.45s linear infinite;
    z-index: -5;
    pointer-events: none;
    opacity: 0.45;
}
@keyframes rainMove {
    from { background-position: 0 0; }
    to { background-position: 0 140px; }
}

.radar {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: conic-gradient(rgba(255, 23, 68, 0.25), transparent 70%);
    animation: radarSpin 8s linear infinite;
    z-index: -6;
    pointer-events: none;
}

.blob {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(183, 28, 28, 0.65), transparent 70%);
    filter: blur(60px);
    border-radius: 50%;
    z-index: -4;
    animation: floatBlob 25s infinite ease-in-out;
}
@keyframes floatBlob {
    0% { transform: translate(0,0); opacity:0.22; }
    50% { transform: translate(100px,-120px); opacity:0.4; }
    100% { transform: translate(-80px,90px); opacity:0.22; }
}

/* Music Control */
#music-control {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 50;
    background: rgba(20, 0, 0, 0.9);
    padding: 10px 16px;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #ff1744;
}
</style>
</head>
<body class="text-white min-h-screen">

<!-- EFFECTS -->
<div class="fog"></div>
<div class="rain"></div>
<div class="radar"></div>

<!-- BLOBS -->
<div class="blob" style="top:12%; left:8%;"></div>
<div class="blob" style="top:58%; left:72%;"></div>
<div class="blob" style="top:28%; left:68%;"></div>
<div class="blob" style="top:72%; left:18%;"></div>

<!-- BACKGROUND MUSIC -->
<audio id="bg-music" loop>
    <source src="https://www.youtube.com/watch?v=Yhu7sck0gAA" type="audio/mp3">
</audio>

<!-- MUSIC CONTROL -->
<div id="music-control" class="text-sm">
    <button onclick="toggleMusic()" class="flex items-center gap-2 text-[#ff1744] hover:text-red-300 transition">
        <span id="music-icon">♪</span>
        <span id="music-text">Play Ambient Music</span>
    </button>
</div>

<!-- LOADING SCREEN -->
<div id="loading-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">
    <h1 class="text-5xl neon-red font-black mb-4 tracking-widest">GOLDEN STATE ROLEPLAY</h1>
    <p class="text-[#ff1744] mb-8 text-xl">v2.0.1 FEATURE EVENT</p>
    <div class="w-96 h-2 bg-zinc-900 rounded-full overflow-hidden border border-red-900">
        <div id="progress" class="h-full bg-[#ff1744] w-0"></div>
    </div>
    <p class="text-red-400 mt-4 text-sm">INITIALIZING NIGHTMARE...</p>
</div>

<!-- MAIN CONTENT -->
<div id="main-content" class="hidden text-center py-20">
    <h1 class="text-6xl neon-red font-black tracking-wider">LIVE EVENTS</h1>
    
    <div class="mt-6 text-red-400 text-xl font-mono" id="current-time">
        Loading date &amp; time...
    </div>

    <div class="grid md:grid-cols-2 gap-10 max-w-6xl mx-auto mt-12">
        <div class="bg-zinc-950 border border-red-900/50 p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-3 text-red-300">Standalone</h2>
            <div id="standalone-timer" class="text-3xl neon-red mb-6">Loading...</div>
            <button id="standalone-btn" disabled class="w-full bg-zinc-900 py-4 rounded-xl font-bold opacity-50 border border-red-900">EVENT LOCKED</button>
        </div>
        
        <div class="bg-zinc-950 border border-red-900/50 p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-3 text-red-300">QBcore</h2>
            <div id="qbcore-timer" class="text-3xl neon-red mb-6">Loading...</div>
            <button id="qbcore-btn" disabled class="w-full bg-zinc-900 py-4 rounded-xl font-bold opacity-50 border border-red-900">EVENT LOCKED</button>
        </div>
    </div>

    <div class="mt-16 text-red-400/70 text-sm max-w-2xl mx-auto px-6">
        You guys are very welcome to stream and help the community out promoting it ❤️
    </div>
</div>

<script>
// Live Date & Time
function updateDateTime() {
    const now = new Date();
    const options = { 
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
    };
    document.getElementById("current-time").textContent = now.toLocaleString('en-US', options);
}
setInterval(updateDateTime, 1000);
updateDateTime();

// LOADING
window.onload = () => {
    let p = 0;
    const bar = document.getElementById("progress");
    const load = setInterval(() => {
        p++;
        bar.style.width = p + "%";
        if(p >= 100){
            clearInterval(load);
            document.getElementById("loading-screen").style.display = "none";
            document.getElementById("main-content").classList.remove("hidden");
            
            setTimeout(() => {
                document.getElementById("bg-music").play().catch(() => {});
            }, 800);
        }
    }, 55);
};

// MUSIC CONTROL
let isPlaying = true;
const audio = document.getElementById("bg-music");

function toggleMusic() {
    if (isPlaying) {
        audio.pause();
        document.getElementById("music-text").textContent = "Music Paused";
    } else {
        audio.play();
        document.getElementById("music-text").textContent = "Playing Ambient";
    }
    isPlaying = !isPlaying;
}

// COUNTDOWN
function startCountdown(timerId, btnId, target, link){
    const timer = document.getElementById(timerId);
    const btn = document.getElementById(btnId);
    
    function update(){
        const diff = target - Date.now();
        if(diff <= 0){
            timer.innerHTML = "🚨 EVENT LIVE 🚨";
            btn.disabled = false;
            btn.className = "w-full bg-[#ff1744] text-black py-4 rounded-xl font-bold border border-red-700";
            btn.innerHTML = "CONNECT NOW";
            btn.onclick = () => window.location.href = link;
            return;
        }
        const d = Math.floor(diff/86400000);
        const h = Math.floor((diff/3600000)%24);
        const m = Math.floor((diff/60000)%60);
        const s = Math.floor((diff/1000)%60);
        timer.innerHTML = `${d}D ${h}H ${m}M ${s}S`;
    }
    update();
    setInterval(update, 1000);
}

startCountdown("standalone-timer", "standalone-btn", new Date("2026-05-08T16:45:00-06:00").getTime(), "fivem://connect/STANDALONE_IP");
startCountdown("qbcore-timer", "qbcore-btn", new Date("2026-05-09T16:45:00-06:00").getTime(), "fivem://connect/QBCORE_IP");
</script>
</body>
</html>
