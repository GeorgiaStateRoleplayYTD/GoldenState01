<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State Roleplay - v2.0.1</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: url('https://i.imgur.com/JHY3Pri.png') center/cover no-repeat fixed;
    overflow-x: hidden;
}

/* DARK BASE */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: -5;
}

/* NEON TEXT */
.neon-green {
    color: #a3e635;
    text-shadow: 0 0 20px #a3e635;
}

/* =========================
   🌫 FOG (NEW EFFECT)
========================= */
.fog {
    position: fixed;
    inset: 0;
    background: url('https://i.imgur.com/oZhKQoT.png');
    background-size: cover;
    opacity: 0.18;
    z-index: -4;
    pointer-events: none;
    animation: fogMove 60s linear infinite;
    mix-blend-mode: screen;
}

@keyframes fogMove {
    0%   { transform: translateX(0px) scale(1.1); }
    50%  { transform: translateX(-80px) scale(1.2); }
    100% { transform: translateX(0px) scale(1.1); }
}

/* =========================
   🟢 FLOATING BLOBS
========================= */
.blob {
    position: fixed;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(163,230,53,0.6), transparent 70%);
    filter: blur(45px);
    border-radius: 50%;
    z-index: -3;
    animation: floatBlob 18s infinite ease-in-out;
    pointer-events: none;
}

@keyframes floatBlob {
    0%   { transform: translate(0,0) scale(1); opacity:0.25; }
    50%  { transform: translate(80px,-100px) scale(1.2); opacity:0.45; }
    100% { transform: translate(-60px,70px) scale(1); opacity:0.25; }
}

/* =========================
   🌧 RAIN
========================= */
.rain {
    position: fixed;
    inset: 0;
    background: url('https://i.imgur.com/7QF3y7X.png');
    opacity: 0.15;
    animation: rainMove 0.4s linear infinite;
    z-index: -2;
    pointer-events: none;
}

@keyframes rainMove {
    from { background-position: 0 0; }
    to { background-position: 0 100px; }
}

/* =========================
   📡 RADAR
========================= */
.radar {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: conic-gradient(rgba(163,230,53,0.2), transparent 60%);
    animation: radarSpin 6s linear infinite;
    z-index: -3;
    pointer-events: none;
}

@keyframes radarSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
}

/* =========================
   ⚡ LIGHTNING
========================= */
#lightning {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>

<body class="text-white min-h-screen">

<!-- EFFECT LAYERS -->
<div class="fog"></div>
<div class="rain"></div>
<div class="radar"></div>
<div id="lightning"></div>

<!-- BLOBS -->
<div class="blob" style="top:10%; left:15%; animation-duration:14s;"></div>
<div class="blob" style="top:60%; left:70%; animation-duration:18s;"></div>
<div class="blob" style="top:30%; left:80%; animation-duration:22s;"></div>
<div class="blob" style="top:75%; left:20%; animation-duration:16s;"></div>

<!-- LOADING -->
<div id="loading-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
    <h1 class="text-5xl neon-green font-black">GOLDEN STATE ROLEPLAY</h1>
</div>

<!-- MAIN -->
<div id="main-content" class="hidden text-center py-20">

<h1 class="text-6xl neon-green font-black">LIVE EVENTS</h1>

<div class="grid md:grid-cols-2 gap-10 max-w-6xl mx-auto mt-16">

<!-- Standalone -->
<div class="bg-zinc-900 p-8 rounded-3xl">
    <h2 class="text-2xl font-bold mb-3">Standalone</h2>
    <div id="standalone-timer" class="text-3xl neon-green mb-6">Loading...</div>

    <button id="standalone-btn"
        disabled
        class="w-full bg-gray-600 py-4 rounded-xl font-bold opacity-50">
        EVENT LOCKED
    </button>
</div>

<!-- QBcore -->
<div class="bg-zinc-900 p-8 rounded-3xl">
    <h2 class="text-2xl font-bold mb-3">QBcore</h2>
    <div id="qbcore-timer" class="text-3xl neon-green mb-6">Loading...</div>

    <button id="qbcore-btn"
        disabled
        class="w-full bg-gray-600 py-4 rounded-xl font-bold opacity-50">
        EVENT LOCKED
    </button>
</div>

</div>
</div>

<script>

/* LOADING */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loading-screen").style.display = "none";
        document.getElementById("main-content").classList.remove("hidden");
        lightningLoop();
    }, 2500);
};

/* LIGHTNING */
function lightningLoop(){
    const flash = document.getElementById("lightning");

    setInterval(() => {
        if(Math.random() < 0.2){
            flash.style.opacity = 0.6;
            setTimeout(() => flash.style.opacity = 0, 120);
        }
    }, 1800);
}

/* COUNTDOWN */
function startCountdown(timerId, btnId, target, link){
    const timer = document.getElementById(timerId);
    const btn = document.getElementById(btnId);

    function update(){
        const now = Date.now();
        const diff = target - now;

        if(diff <= 0){
            timer.innerHTML = "🚨 EVENT LIVE 🚨";

            btn.disabled = false;
            btn.className = "w-full bg-[#a3e635] py-4 rounded-xl font-bold";

            btn.innerHTML = "CONNECT NOW";

            btn.onclick = () => {
                document.body.style.filter = "hue-rotate(0deg) saturate(2)";
                window.location.href = link;
            };

            return;
        }

        const d = Math.floor(diff/86400000);
        const h = Math.floor(diff/3600000%24);
        const m = Math.floor(diff/60000%60);
        const s = Math.floor(diff/1000%60);

        timer.innerHTML = `${d}D ${h}H ${m}M ${s}S`;
    }

    update();
    setInterval(update, 1000);
}

/* EVENTS */
startCountdown(
    "standalone-timer",
    "standalone-btn",
    new Date("2026-05-08T16:45:00-06:00").getTime(),
    "fivem://connect/STANDALONE_IP"
);

startCountdown(
    "qbcore-timer",
    "qbcore-btn",
    new Date("2026-05-09T16:45:00-06:00").getTime(),
    "fivem://connect/QBCORE_IP"
);

</script>

</body>
</html>
