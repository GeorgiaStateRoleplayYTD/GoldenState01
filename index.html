<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden State Roleplay - v2.0.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="https://i.imgur.com/vB2Gt8p.png" type="image/png">

    <style>
        body {
            background: url('https://i.imgur.com/JHY3Pri.png') center/cover no-repeat fixed;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: -1;
        }
        .neon-green {
            color: #a3e635;
            text-shadow: 0 0 20px #a3e635;
        }
        .crt { position: relative; }
        .crt::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(163, 230, 53, 0.08) 2px,
                rgba(163, 230, 53, 0.08) 4px
            );
            pointer-events: none;
        }
    </style>
</head>

<body class="text-white min-h-screen">

<!-- LOADING -->
<div id="loading-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">
    <img src="https://i.imgur.com/vB2Gt8p.png" class="h-32 mb-6">
    <h1 class="text-5xl font-black neon-green">GOLDEN STATE ROLEPLAY</h1>
    <p class="text-[#a3e635] mt-2">v2.0.1 UPDATE</p>

    <div class="w-96 h-2 bg-zinc-800 mt-8 rounded-full overflow-hidden">
        <div id="progress" class="h-full bg-[#a3e635] w-0"></div>
    </div>
</div>

<div id="main-content" class="hidden">

<!-- NAV -->
<nav class="bg-black/90 border-b border-[#a3e635]/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">
        <div class="flex items-center gap-4">
            <img src="https://i.imgur.com/vB2Gt8p.png" class="h-12">
            <div>
                <h1 class="font-black text-xl">GOLDEN STATE</h1>
                <p class="text-[#a3e635] text-sm">ROLEPLAY v2.0.1</p>
            </div>
        </div>

        <a href="https://discord.gg/m34XMdwCvX"
           class="bg-[#a3e635] text-black px-5 py-2 rounded-xl font-bold">
            JOIN DISCORD
        </a>
    </div>
</nav>

<!-- HERO -->
<section class="py-24 text-center">
    <h1 class="text-6xl font-black neon-green">GOLDEN STATE ROLEPLAY</h1>
    <p class="text-gray-300 mt-4">Bigger. Better. More Immersive.</p>
</section>

<!-- LIVE EVENTS -->
<section class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-5xl font-black text-center neon-green mb-16">LIVE EVENTS</h2>

    <div class="grid md:grid-cols-2 gap-10 text-center">

        <!-- Standalone -->
        <div class="bg-zinc-900 border border-[#a3e635]/30 rounded-3xl p-10 crt">
            <h3 class="text-3xl font-bold mb-4">Standalone Event</h3>
            <p class="text-gray-400 mb-6">08/05/2026 • 16:45 CST</p>

            <div id="standalone-timer" class="text-4xl font-mono neon-green mb-8">Loading...</div>

            <button id="standalone-btn"
                disabled
                class="w-full bg-gray-600 text-black py-5 rounded-2xl font-bold opacity-50 cursor-not-allowed">
                EVENT LOCKED
            </button>
        </div>

        <!-- QBcore -->
        <div class="bg-zinc-900 border border-[#a3e635]/30 rounded-3xl p-10 crt">
            <h3 class="text-3xl font-bold mb-4">QBcore Event</h3>
            <p class="text-gray-400 mb-6">09/05/2026 • 16:45 CST</p>

            <div id="qbcore-timer" class="text-4xl font-mono neon-green mb-8">Loading...</div>

            <button id="qbcore-btn"
                disabled
                class="w-full bg-gray-600 text-black py-5 rounded-2xl font-bold opacity-50 cursor-not-allowed">
                EVENT LOCKED
            </button>
        </div>

    </div>
</section>

<footer class="text-center py-10 text-gray-500 border-t border-[#a3e635]/20">
    Golden State Roleplay • v2.0.1 • 2026
</footer>

</div>

<!-- SCRIPTS -->
<script>
window.onload = () => {
    let progress = 0;
    const bar = document.getElementById('progress');
    const load = document.getElementById('loading-screen');
    const main = document.getElementById('main-content');

    const interval = setInterval(() => {
        progress += 1;
        bar.style.width = progress + "%";

        if (progress >= 100) {
            clearInterval(interval);
            load.style.display = "none";
            main.classList.remove("hidden");
        }
    }, 80);
};

// Countdown system
function startCountdown(timerId, btnId, target, link) {
    const timer = document.getElementById(timerId);
    const btn = document.getElementById(btnId);

    function update() {
        const now = Date.now();
        const diff = target - now;

        if (diff <= 0) {
            timer.innerHTML = "🚨 EVENT LIVE 🚨";

            btn.disabled = false;
            btn.className =
                "w-full bg-[#a3e635] hover:bg-[#bef575] text-black py-5 rounded-2xl font-bold cursor-pointer";

            btn.innerHTML = "CONNECT NOW";

            btn.onclick = () => {
                window.location.href = link;
            };

            return;
        }

        const d = Math.floor(diff / (1000*60*60*24));
        const h = Math.floor((diff / (1000*60*60)) % 24);
        const m = Math.floor((diff / (1000*60)) % 60);
        const s = Math.floor((diff / 1000) % 60);

        timer.innerHTML = `${d}D ${h}H ${m}M ${s}S`;
    }

    update();
    setInterval(update, 1000);
}

// TIMES (CST)
const standaloneTime = new Date("2026-05-08T16:45:00-06:00").getTime();
const qbcoreTime = new Date("2026-05-09T16:45:00-06:00").getTime();

// CONNECT LINKS (CHANGE THESE)
startCountdown(
    "standalone-timer",
    "standalone-btn",
    standaloneTime,
    "fivem://connect/YOUR_STANDALONE_IP"
);

startCountdown(
    "qbcore-timer",
    "qbcore-btn",
    qbcoreTime,
    "fivem://connect/YOUR_QBCORE_IP"
);
</script>

</body>
</html>
